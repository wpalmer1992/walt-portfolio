<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Walt Palmer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230E0E0C'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='13' fill='%23C8191E' letter-spacing='-1'%3EWP%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8191E;
    --cream: #F2EDE4;
    --dark: #0E0E0C;
    --near-black: #1A1918;
    --text: #2A2826;
    --text-light: #8A8480;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    background-image:
      linear-gradient(rgba(242,237,228,0.62), rgba(242,237,228,0.62)),
      url('Texturelabs_Paper_361XL.jpg');
    background-size: auto, cover;
    background-attachment: scroll, scroll;
    background-position: center, center;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.18;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
    mix-blend-mode: multiply;
  }

  /* ========== NAV ========== */
  .site-nav {
    position: fixed;
    top: 0;
    right: 0;
    z-index: 900;
    padding: 1.5rem 2.5rem;
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .site-nav a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
    text-decoration: none;
    position: relative;
    transition: color 0.3s;
  }

  .site-nav a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1.5px;
    background: var(--red);
    transition: width 0.3s ease;
  }

  .site-nav a:hover::after { width: 100%; }

  /* ========== PAGE HEADER ========== */
  .page-header {
    background: var(--dark);
    padding: 10rem 3rem 6rem;
    position: relative;
    overflow: hidden;
  }

  .page-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(200,25,30,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  .page-header-inner {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }

  .page-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    color: var(--red);
    margin-bottom: 1.5rem;
  }

  .page-title {
    font-family: 'Anton', sans-serif;
    font-size: clamp(4rem, 12vw, 9rem);
    text-transform: uppercase;
    color: var(--cream);
    line-height: 0.9;
    letter-spacing: -0.02em;
  }

  .page-sub {
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: rgba(242,237,228,0.4);
    margin-top: 1.5rem;
    line-height: 1.8;
  }

  /* ========== FORM SECTION ========== */
  .contact-section {
    max-width: 720px;
    margin: 0 auto;
    padding: 6rem 3rem;
  }

  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-field label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .form-field input,
  .form-field textarea {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid rgba(42,40,38,0.25);
    padding: 0.75rem 0;
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s;
    width: 100%;
  }

  .form-field input:focus,
  .form-field textarea:focus {
    border-color: var(--red);
  }

  .form-field textarea {
    resize: none;
    height: 160px;
    line-height: 1.7;
  }

  .form-submit {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 1rem;
    border-top: 3px solid var(--dark);
  }

  .form-note {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .submit-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--dark);
    border: none;
    padding: 0.85rem 2rem;
    cursor: pointer;
    transition: background 0.3s;
  }

  .submit-btn:hover { background: var(--red); }

  /* ========== SUCCESS STATE ========== */
  .form-success {
    display: none;
    text-align: center;
    padding: 4rem 0;
  }

  .form-success .success-mark {
    font-family: 'Anton', sans-serif;
    font-size: 4rem;
    color: var(--red);
    line-height: 1;
    margin-bottom: 1rem;
  }

  .form-success p {
    font-family: 'Barlow', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.8;
  }

  /* ========== TEXT TEXTURE ========== */
  .page-title-light {
    background-image: url('Texturelabs_Paper_375XL.jpg');
    background-size: 900px auto;
    background-attachment: scroll;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* ========== PAGE LOADER ========== */
  #page-loader {
    position: fixed;
    inset: 0;
    background: var(--dark);
    z-index: 999999;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #page-loader.done { opacity: 0; }

  /* ========== HAMBURGER ========== */
  .nav-toggle {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    z-index: 1001;
  }
  .nav-toggle span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--cream);
    transition: transform 0.3s ease, opacity 0.3s ease;
    transform-origin: center;
  }
  .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .nav-links { display: flex; gap: 2.5rem; align-items: center; }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 768px) {
    .nav-toggle { display: flex; }
    .site-nav { padding: 1.2rem 1.5rem; }
    .nav-links {
      position: fixed;
      inset: 0;
      background: var(--dark);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 800;
    }
    .nav-links.open { transform: translateX(0); }
    .nav-links a { font-size: 1.3rem; letter-spacing: 0.2em; color: var(--cream); }
    .nav-links a::after { display: none; }

    .page-header { padding: 8rem 1.5rem 4rem; }
    .contact-section { padding: 4rem 1.5rem; }
    .form-row { grid-template-columns: 1fr; }
    .form-submit { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
    .submit-btn { width: 100%; text-align: center; padding: 1rem; }
  }
</style>
</head>
<body>

<div id="page-loader"></div>

<nav class="site-nav">
  <a href="index.html#about">About</a>
  <a href="index.html#reel">Reel</a>
  <a href="writing.html">Writing</a>
  <a href="clearing-my-name.html">Clearing My Name</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- ========== PAGE HEADER ========== -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="page-label">Walt Palmer</div>
    <h1 class="page-title">Let's Talk.</h1>
    <p class="page-sub">Available for full-time and select freelance projects.</p>
  </div>
</div>

<!-- ========== FORM ========== -->
<section class="contact-section">
  <form class="contact-form" action="https://formspree.io/f/xnjldlpz" method="POST" id="contact-form">
    <div class="form-row">
      <div class="form-field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name">
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>
    </div>
    <div class="form-field">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="What's this about?">
    </div>
    <div class="form-field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required placeholder="Tell me about the project..."></textarea>
    </div>
    <div class="form-submit">
      <span class="form-note">I'll get back to you within 24 hours.</span>
      <button type="submit" class="submit-btn">Send Message</button>
    </div>
  </form>

  <div class="form-success" id="form-success">
    <div class="success-mark">✓</div>
    <p>Message sent.<br>I'll be in touch soon.</p>
  </div>
</section>

<script src="seasonal.js"></script>
<script>
  document.fonts.ready.then(() => requestAnimationFrame(() => document.getElementById('page-loader').classList.add('done')));

  // Hamburger
  const navToggle = document.querySelector('.nav-toggle');
  const navLinks  = document.querySelector('.nav-links');
  navToggle.addEventListener('click', () => {
    navToggle.classList.toggle('open');
    navLinks.classList.toggle('open');
  });
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    navToggle.classList.remove('open');
    navLinks.classList.remove('open');
  }));

  const form = document.getElementById('contact-form');
  const success = document.getElementById('form-success');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const res = await fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      form.style.display = 'none';
      success.style.display = 'block';
      showThanks();
    }
  });

  function showThanks() {
    // ---- "Thanks!" popup ----
    const toast = document.createElement('div');
    toast.textContent = 'Thanks!';
    toast.style.cssText = `
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      font-family: 'Anton', sans-serif;
      font-size: clamp(4rem, 14vw, 10rem);
      text-transform: uppercase;
      color: var(--red);
      pointer-events: none;
      z-index: 9999;
      filter: drop-shadow(0 4px 32px rgba(200,25,30,0.4));
      animation: thanksPop 2.2s cubic-bezier(0.22,1,0.36,1) forwards;
    `;
    document.body.appendChild(toast);
    toast.addEventListener('animationend', () => toast.remove());

    // ---- Kiss emoji rain ----
    const count = 42;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.textContent = '💋';
        const size = 1.2 + Math.random() * 1.8;
        const x    = Math.random() * 100;
        const dur  = 1.8 + Math.random() * 1.6;
        const spin = (Math.random() - 0.5) * 360;
        el.style.cssText = `
          position: fixed;
          top: -4rem;
          left: ${x}vw;
          font-size: ${size}rem;
          pointer-events: none;
          z-index: 9998;
          animation: kissRain ${dur}s ease-in forwards;
          --spin: ${spin}deg;
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }, i * 60);
    }
  }
</script>

<style>
  @keyframes thanksPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    40%  { transform: translate(-50%, -50%) scale(0.97); }
    55%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
  }

  @keyframes kissRain {
    0%   { transform: translateY(0)           rotate(0deg);         opacity: 1; }
    100% { transform: translateY(110vh)        rotate(var(--spin));  opacity: 0.3; }
  }
</style>
</body>
</html>
